version: '3.8'

services:
  # PostgreSQL with TimescaleDB
  postgres:
    image: timescaledb/timescaledb:latest-pg15
    container_name: odyssey_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-odyssey_trading}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trading_network

  # Trading System Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: odyssey_trading_app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-odyssey_trading}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      UPSTOX_API_KEY: ${UPSTOX_API_KEY}
      UPSTOX_ACCESS_TOKEN: ${UPSTOX_ACCESS_TOKEN}
      PYTHONUNBUFFERED: 1
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    networks:
      - trading_network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  trading_network:
    driver: bridge
